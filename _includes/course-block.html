<div class="course-block course">
  <div class="course-heading">
    <h2 class="course-title"><a href="{{ include.slug }}">{{ include.title }}</a></h2>
  </div>

  <div class="course-media">
    <img class="course-poster" src="{{ include.poster }}" alt="Poster for {{ include.title }}">
  </div>

  <div class="course-summary">
    <p class="course-desc">
      {{ include.desc | markdownify | remove: '<p>' | remove: '</p>' }}
    </p>
  </div>
</div>
