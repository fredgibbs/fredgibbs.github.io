{% for row in site.data.toc.toc-rows %}
  <div class="toc-row">
    <div class="toc-title title">
      <a href="{{ row.link }}">{{ row.title }}</a>
    </div>
    <div class="toc-headings headings">
      {% for heading in row.headings %}
        <a href="{{ heading.link }}">{{ heading.title }}</a>
      {% endfor %}
    </div>
  </div>
{% endfor %}
